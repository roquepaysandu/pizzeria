<div class="carrito-box">
    <h3>Tu Pedido:</h3>
    <ul id="lista-pedido" style="padding-left: 20px; line-height: 1.6;"></ul>
    
    <div style="margin-top: 15px;">
        <label for="direccion" style="display: block; font-weight: bold; margin-bottom: 5px;">Dirección de Entrega:</label>
        <input type="text" id="direccion" placeholder="Ej: Av. Italia 1234, Apto 201" 
               style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
    </div>

    <hr>
    <p style="text-align: right; font-size: 1.4em;"><strong>Total: $<span id="total-final">0</span></strong></p>
    <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar pedido por WhatsApp 📱</button>
</div>
