<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Express Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #e74c3c; text-align: center; }

        /* Estilo del menú en Grid */
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; border: 1px solid #ddd; overflow: hidden; text-align: center; position: relative; display: flex; flex-direction: column; }
        .img-grid { width: 100%; height: 140px; object-fit: cover; background-color: #eee; }
        .info-card { padding: 12px; flex-grow: 1; }
        .precio { color: #27ae60; font-weight: bold; display: block; margin: 5px 0; }
        .btn-add { background-color: #e67e22; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }

        /* Carrito */
        .carrito-box { margin-top: 30px; padding: 20px; background: #fff9f9; border-radius: 10px; border: 1px solid #fab1a0; }
        .btn-principal { width: 100%; padding: 15px; background-color: #25D366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; }

        /* VENTANA MODAL (La "otra pantalla") */
        .modal {
            display: none; 
            position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center;
        }
        .btn-opcion { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-gps { background-color: #3498db; color: white; }
        .btn-escribir { background-color: #95a5a6; color: white; }

        /* Notificación Aceptado */
        .notificacion-flotante {
            position: absolute; background: #27ae60; color: white; padding: 8px 15px; border-radius: 20px;
            font-size: 0.9em; font-weight: bold; pointer-events: none; z-index: 1000;
            animation: subirYDesaparecer 2s forwards;
        }
        @keyframes subirYDesaparecer {
            0% { opacity: 0; transform: translateY(0); }
            15% { opacity: 1; transform: translateY(-15px); }
            100% { opacity: 0; transform: translateY(-45px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Pizzería Express</h1>
    <div id="menu-grid" class="grid-menu"></div>

    <div class="carrito-box">
        <h3>Tu Pedido:</h3>
        <ul id="lista-pedido"></ul>
        <p style="text-align: right; font-size: 1.4em;"><strong>Total: $<span id="total-final">0</span></strong></p>
        <button class="btn-principal" onclick="abrirModal()">Finalizar Pedido 📱</button>
    </div>
</div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <h2>📍 Entrega</h2>
        <p>¿Cómo prefieres darnos tu dirección?</p>
        <button class="btn-opcion btn-gps" onclick="obtenerUbicacion()">Usar mi ubicación GPS (Maps)</button>
        <div style="margin: 10px 0;">— o —</div>
        <input type="text" id="direccion-manual" placeholder="Escribe tu dirección aquí..." style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
        <button class="btn-opcion btn-escribir" onclick="enviarConDireccionManual()">Enviar con esta dirección</button>
        <button onclick="cerrarModal()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px;">Cancelar</button>
    </div>
</div>

<script>
    const productos = [
        { nombre: "Pizza Margarita", precio: 350, img: "https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?w=300" },
        { nombre: "Pizza Pepperoni", precio: 420, img: "https://images.pexels.com/photos/4109111/pexels-photo-4109111.jpeg?w=300" },
        { nombre: "Pizza Hawaiana", precio: 400, img: "https://images.pexels.com/photos/367915/pexels-photo-367915.jpeg?w=300" },
        { nombre: "Pizza 4 Quesos", precio: 450, img: "https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?w=300" },
        { nombre: "Fainá", precio: 80, img: "https://cdn.pixabay.com/photo/2017/09/30/15/10/plate-2802332_1280.jpg" },
        { nombre: "Papas Fritas", precio: 150, img: "https://images.pexels.com/photos/1893556/pexels-photo-1893556.jpeg?w=300" }
    ];

    let carrito = [];
    let total = 0;
    const nroWhatsApp = "59898943363";

    function renderizarMenu() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = productos.map(p => `
            <div class="card">
                <img src="${p.img}" class="img-grid" onerror="this.src='https://via.placeholder.com/300x140?text=Comida'">
                <div class="info-card"><b>${p.nombre}</b><span class="precio">$${p.precio}</span></div>
                <button class="btn-add" onclick="sumar(event, '${p.nombre}', ${p.precio})">Añadir</button>
            </div>
        `).join('');
    }

    function sumar(event, nombre, precio) {
        carrito.push(nombre);
        total += precio;
        
        const btn = event.target;
        const rect = btn.getBoundingClientRect();
        const aviso = document.createElement('div');
        aviso.className = 'notificacion-flotante';
        aviso.textContent = 'Aceptado ✓';
        aviso.style.left = (rect.left + window.scrollX) + 'px';
        aviso.style.top = (rect.top + window.scrollY - 30) + 'px';
        document.body.appendChild(aviso);
        setTimeout(() => aviso.remove(), 2000);

        const lista = document.getElementById('lista-pedido');
        const li = document.createElement('li');
        li.textContent = "✅ " + nombre;
        lista.appendChild(li);
        document.getElementById('total-final').textContent = total;
    }

    // Lógica de la Pantalla de Dirección (Modal)
    function abrirModal() {
        if (carrito.length === 0) return alert("Carrito vacío");
        document.getElementById('miModal').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('miModal').style.display = 'none';
    }

    function obtenerUbicacion() {
        if (!navigator.geolocation) return alert("Tu navegador no soporta GPS");
        
        alert("Buscando tu ubicación... por favor acepta el permiso en tu celular.");
        
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const linkMaps = `https://www.google.com/maps?q=${lat},${lon}`;
            enviarFinal("Ubicación por GPS (Maps): " + linkMaps);
        }, () => {
            alert("No pudimos obtener tu ubicación. Por favor, escríbela manualmente.");
        });
    }

    function enviarConDireccionManual() {
        const dir = document.getElementById('direccion-manual').value;
        if (dir.trim() === "") return alert("Escribe una dirección");
        enviarFinal("Dirección: " + dir);
    }

    function enviarFinal(datoDireccion) {
        let msg = "*Nuevo Pedido*\n\n" + datoDireccion + "\n\n*Detalle:*\n";
        carrito.forEach(item => msg += "- " + item + "\n");
        msg += "\n*Total: $" + total + "*";
        window.open(`https://wa.me/${nroWhatsApp}?text=${encodeURIComponent(msg)}`);
        cerrarModal();
    }

    renderizarMenu();
</script>
</body>
</html>
