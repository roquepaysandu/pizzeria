<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Express - Menú Completo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #e74c3c; text-align: center; font-size: 2em; margin-bottom: 25px; }

        /* Estructura de Cuadrícula (Grid) */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #ddd;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .img-grid {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background-color: #eee;
        }

        .info-card { padding: 12px; text-align: center; flex-grow: 1; }
        .info-card b { display: block; font-size: 1.1em; color: #333; }
        .info-card .precio { color: #27ae60; font-weight: bold; margin-top: 5px; display: block; }

        .btn-add {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-add:hover { background-color: #d35400; }

        /* Carrito */
        .carrito-box {
            margin-top: 30px;
            padding: 20px;
            background: #fff9f9;
            border-radius: 10px;
            border: 1px solid #fab1a0;
        }
        .btn-whatsapp {
            width: 100%;
            padding: 15px;
            background-color: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Pizzería Express</h1>
    
    <div id="menu-grid" class="grid-menu">
        </div>

    <div class="carrito-box">
        <h3>Tu Pedido:</h3>
        <ul id="lista-pedido" style="padding-left: 20px; color: #555;"></ul>
        <hr>
        <p style="text-align: right; font-size: 1.4em;"><strong>Total: $<span id="total-final">0</span></strong></p>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar pedido por WhatsApp 📱</button>
    </div>
</div>

<script>
    // LISTA DE PRODUCTOS COMPLETA
    const productos = [
        { nombre: "Pizza Margarita", precio: 350, img: "https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?auto=compress&w=300" },
        { nombre: "Pizza Pepperoni", precio: 420, img: "https://images.pexels.com/photos/4109111/pexels-photo-4109111.jpeg?auto=compress&w=300" },
        { nombre: "Pizza Hawaiana", precio: 400, img: "https://images.pexels.com/photos/367915/pexels-photo-367915.jpeg?auto=compress&w=300" },
        { nombre: "Pizza 4 Quesos", precio: 450, img: "https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?auto=compress&w=300" },
        { nombre: "Fainá", precio: 80, img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Fain%C3%A1_01.jpg/300px-Fain%C3%A1_01.jpg" },
        { nombre: "Papas Fritas", precio: 150, img: "https://images.pexels.com/photos/1893556/pexels-photo-1893556.jpeg?auto=compress&w=300" }
    ];

    let carrito = [];
    let total = 0;

    function renderizarMenu() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = "";
        
        productos.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}" class="img-grid" onerror="this.src='https://via.placeholder.com/300x140?text=Pizza'">
                    <div class="info-card">
                        <b>${p.nombre}</b>
                        <span class="precio">$${p.precio}</span>
                    </div>
                    <button class="btn-add" onclick="sumar('${p.nombre}', ${p.precio})">Añadir al pedido</button>
                </div>
            `;
        });
    }

    function sumar(nombre, precio) {
        carrito.push(nombre);
        total += precio;
        
        // Actualizar lista visual
        const lista = document.getElementById('lista-pedido');
        const li = document.createElement('li');
        li.textContent = nombre + " ($" + precio + ")";
        lista.appendChild(li);
        
        // Actualizar total
        document.getElementById('total-final').textContent = total;
    }

    function enviarWhatsApp() {
        if (carrito.length === 0) return alert("¡Elige algo rico primero!");
        
        const tel = "59898943363";
        let msg = "*Nuevo Pedido:*\n";
        carrito.forEach(item => msg += "- " + item + "\n");
        msg += "\n*Total a pagar: $" + total + "*";
        
        window.open("https://wa.me/" + tel + "?text=" + encodeURIComponent(msg));
    }

    renderizarMenu();
</script>

</body>
</html>
