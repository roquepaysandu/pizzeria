<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Express</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #e74c3c; text-align: center; }
        .producto { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .img-pizza { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .info { flex-grow: 1; }
        .info b { display: block; font-size: 1.1em; }
        .info i { color: #27ae60; font-style: normal; font-weight: bold; }
        .btn-add { background: #e67e22; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .carrito { margin-top: 20px; padding: 15px; background: #fff8f0; border-radius: 8px; border: 1px solid #ffe0b2; }
        .btn-whatsapp { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Pizzería Express</h1>
    <div id="contenedor-menu"></div>

    <div class="carrito">
        <strong>Tu Pedido:</strong>
        <ul id="lista-pedido" style="font-size: 0.9em; padding-left: 20px;"></ul>
        <div style="text-align: right;"><strong>Total: $<span id="total-html">0</span></strong></div>
        <button class="btn-whatsapp" onclick="enviarPedido()">Enviar pedido a WhatsApp 📱</button>
    </div>
</div>

<script>
    // 1. Datos con nuevas imágenes (Margarita corregida)
    const pizzas = [
        { nombre: "Pizza Margarita", precio: 350, img: "https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?auto=compress&cs=tinysrgb&w=200" },
        { nombre: "Pizza Pepperoni", precio: 420, img: "https://images.pexels.com/photos/4109111/pexels-photo-4109111.jpeg?auto=compress&cs=tinysrgb&w=200" },
        { nombre: "Pizza Hawaiana", precio: 400, img: "https://images.pexels.com/photos/367915/pexels-photo-367915.jpeg?auto=compress&cs=tinysrgb&w=200" },
        { nombre: "Pizza 4 Quesos", precio: 450, img: "https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?auto=compress&cs=tinysrgb&w=200" }
    ];

    let miCarrito = [];
    let miTotal = 0;

    // 2. Generar menú (Usando concatenación simple para evitar errores)
    function cargarPizzas() {
        const div = document.getElementById('contenedor-menu');
        let html = "";
        
        for (let i = 0; i < pizzas.length; i++) {
            html += '<div class="producto">' +
                    '<img src="' + pizzas[i].img + '" class="img-pizza" onerror="this.src=\'https://via.placeholder.com/70?text=Pizza\'">' +
                    '<div class="info">' +
                        '<b>' + pizzas[i].nombre + '</b>' +
                        '<i>$' + pizzas[i].precio + '</i>' +
                    '</div>' +
                    '<button class="btn-add" onclick="agregar(\'' + pizzas[i].nombre + '\',' + pizzas[i].precio + ')">Añadir</button>' +
                '</div>';
        }
        div.innerHTML = html;
    }

    // 3. Lógica del Carrito
    function agregar(nom, pre) {
        miCarrito.push(nom);
        miTotal += pre;
        
        const lista = document.getElementById('lista-pedido');
        const item = document.createElement('li');
        item.textContent = nom;
        lista.appendChild(item);
        
        document.getElementById('total-html').textContent = miTotal;
    }

    // 4. WhatsApp
    function enviarPedido() {
        if (miCarrito.length === 0) return alert("Selecciona una pizza");
        
        const telefono = "59898943363";
        let texto = "Hola! Quiero pedir:\n" + miCarrito.join("\n") + "\n\nTotal: $" + miTotal;
        
        window.open("https://wa.me/" + telefono + "?text=" + encodeURIComponent(texto));
    }

    cargarPizzas();
</script>

</body>
</html>
