<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Express - Menú</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #e74c3c; text-align: center; }

        /* Estilo del mensaje Aceptado flotante */
        .notificacion-flotante {
            position: absolute;
            background: #27ae60;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            pointer-events: none;
            animation: subirYDesaparecer 0.8s forwards;
            z-index: 1000;
        }

        @keyframes subirYDesaparecer {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* Estructura Grid */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #ddd;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .img-grid {
            width: 100%;
            height: 140px;
            object-fit: cover;
            background-color: #eee;
        }

        .info-card { padding: 12px; }
        .precio { color: #27ae60; font-weight: bold; display: block; margin: 5px 0; }

        .btn-add {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .carrito-box { margin-top: 30px; padding: 20px; background: #fff9f9; border-radius: 10px; border: 1px solid #fab1a0; }
        .btn-whatsapp { width: 100%; padding: 15px; background-color: #25D366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Pizzería Express</h1>
    
    <div id="menu-grid" class="grid-menu"></div>

    <div class="carrito-box">
        <h3>Tu Pedido:</h3>
        <ul id="lista-pedido" style="padding-left: 20px;"></ul>
        <p style="text-align: right; font-size: 1.4em;"><strong>Total: $<span id="total-final">0</span></strong></p>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar pedido por WhatsApp 📱</button>
    </div>
</div>

<script>
    const productos = [
        { nombre: "Pizza Margarita", precio: 350, img: "https://images.pexels.com/photos/1146760/pexels-photo-1146760.jpeg?w=300" },
        { nombre: "Pizza Pepperoni", precio: 420, img: "https://images.pexels.com/photos/4109111/pexels-photo-4109111.jpeg?w=300" },
        { nombre: "Pizza Hawaiana", precio: 400, img: "https://images.pexels.com/photos/367915/pexels-photo-367915.jpeg?w=300" },
        { nombre: "Pizza 4 Quesos", precio: 450, img: "https://images.pexels.com/photos/825661/pexels-photo-825661.jpeg?w=300" },
        { nombre: "Fainá", precio: 80, img: "https://cdn.pixabay.com/photo/2017/09/30/15/10/plate-2802332_1280.jpg" },
        { nombre: "Papas Fritas", precio: 150, img: "https://images.pexels.com/photos/1893556/pexels-photo-1893556.jpeg?w=300" }
    ];

    let carrito = [];
    let total = 0;

    function renderizarMenu() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = productos.map((p, index) => `
            <div class="card">
                <img src="${p.img}" class="img-grid" onerror="this.src='https://img.icons8.com/color/144/pizza.png'">
                <div class="info-card">
                    <b>${p.nombre}</b>
                    <span class="precio">$${p.precio}</span>
                </div>
                <button class="btn-add" onclick="sumar(event, '${p.nombre}', ${p.precio})">Añadir</button>
            </div>
        `).join('');
    }

    function sumar(event, nombre, precio) {
        carrito.push(nombre);
        total += precio;
        
        // --- Lógica del mensaje "Aceptado" cerca del botón ---
        const btn = event.target;
        const rect = btn.getBoundingClientRect();
        
        const aviso = document.createElement('div');
        aviso.className = 'notificacion-flotante';
        aviso.textContent = 'Aceptado ✓';
        
        // Posicionamos el aviso sobre el botón
        aviso.style.left = (rect.left + window.scrollX + (rect.width / 4)) + 'px';
        aviso.style.top = (rect.top + window.scrollY - 20) + 'px';
        
        document.body.appendChild(aviso);
        
        // Eliminar el elemento después de la animación
        setTimeout(() => { aviso.remove(); }, 800);

        // Actualizar carrito visual
        const lista = document.getElementById('lista-pedido');
        const li = document.createElement('li');
        li.textContent = "✅ " + nombre;
        lista.appendChild(li);
        document.getElementById('total-final').textContent = total;
    }

    function enviarWhatsApp() {
        if (carrito.length === 0) return alert("El carrito está vacío");
        const tel = "59898943363";
        let msg = "*Pedido:* \n" + carrito.join("\n") + "\n\n*Total: $" + total + "*";
        window.open("https://wa.me/" + tel + "?text=" + encodeURIComponent(msg));
    }

    renderizarMenu();
</script>
</body>
</html>
